name: Build and Release Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller --noconfirm --clean CrashReader.spec

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Locate ISCC compiler
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles(x86)\Inno Setup 5\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 5\ISCC.exe"
          )

          $iscc = $null
          foreach ($path in $candidates) {
            if (Test-Path $path) {
              $iscc = $path
              break
            }
          }

          if (-not $iscc) {
            throw "ISCC.exe not found after installing Inno Setup"
          }

          "ISCC_EXE=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        run: |
          & "$env:ISCC_EXE" installer.iss

      - name: Prepare release asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $source = "installer/CrashReader-Setup.exe"
          $target = "installer/CrashReader-Setup-$tag.exe"
          Copy-Item $source $target -Force
          "ASSET_PATH=$target" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ASSET_PATH }}
